<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TESDA Neon Tools</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  🔵 TESDA NEON CARPENTRY TOOLS
</header>

<input type="text" id="search" placeholder="Search tools...">

<!-- ADD TOOL -->
<div class="panel">
  <h3>➕ Add Tool</h3>
  <input id="name" placeholder="Tool name">
  <input id="desc" placeholder="Description">
  <input id="image" placeholder="Image URL or images/filename.jpg">
  <button onclick="addTool()">ADD</button>
</div>

<!-- TOOL LIST -->
<div class="grid" id="grid"></div>

<script src="script.js"></script>
</body>
</html>
